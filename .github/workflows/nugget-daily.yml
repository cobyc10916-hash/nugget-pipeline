name: NUGGET daily pull

# Runs in GitHub's cloud (your laptop can be closed). Pulls the newest reputable-AI-channel
# uploads, fetches transcripts via the Webshare proxy, extracts nuggets, and writes them to the
# Supabase feed. Free for this public repo. All creds come from repo Settings -> Secrets.

on:
  schedule:
    # 3x/day, UTC (GitHub cron does NOT shift for daylight saving). In summer (CDT, UTC-5):
    - cron: "0 11 * * *"   # 6:00 AM Central
    - cron: "0 17 * * *"   # 12:00 PM Central
    - cron: "0 23 * * *"   # 6:00 PM Central
  workflow_dispatch:        # adds a "Run workflow" button so you can fire it on demand
    inputs:
      limit:
        description: "Max videos to pull this run"
        default: "20"
      hours:
        description: "Look-back window in hours"
        default: "24"

concurrency:
  group: nugget-daily       # never let two runs overlap
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
      WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
      SUPABASE_URL: https://ellnuqqlssupsrglxmwn.supabase.co
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Extractor. gemini-3.1-flash-lite = strong + reliable, ~3x cheaper than Haiku. Levers:
      #   gemini-2.5-flash-lite (cheapest, when not throttled) | claude-haiku-4-5 | claude-sonnet-4-6
      EXTRACT_MODEL: gemini-3.1-flash-lite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Pull, extract, write to feed
        run: |
          python backend/pipeline.py recent \
            --limit "${{ github.event.inputs.limit || '20' }}" \
            --hours "${{ github.event.inputs.hours || '24' }}"
