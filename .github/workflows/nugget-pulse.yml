name: NUGGET pulse

# The recall-first 24h AI digest. Ingest ALL sources HOURLY during the day (skips overnight) into
# pulse_items; synthesize the brief 3x/day. Ingest is cheap (keyless except Supabase; ~no model cost),
# so hourly keeps Pulse fresh for nearly free. Synthesis uses Claude. X/Twitter comes via Apify.

on:
  schedule:
    # Hourly 6am-11pm Eastern (skips ~midnight-5am EDT = 04:00-09:59 UTC). Cheap, keeps Pulse fresh.
    # Split into two crons so the brief windows are identified by WHICH cron fired (github.event.schedule),
    # NOT the wall-clock hour: GitHub delays scheduled runs 15-60min, which used to push a "22:00" run to
    # 23:00 and silently skip synthesis + X ingest. Branching on the cron string is immune to that delay.
    - cron: "0 0-3,10,12-15,17-21,23 * * *"   # ingest-only hours
    - cron: "0 11,16,22 * * *"                # ingest + X/Twitter + synthesize (the 3 daily briefs)
  workflow_dispatch:
    inputs:
      mode:
        description: "ingest | synthesize | both"
        default: "both"

concurrency:
  group: nugget-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: https://ellnuqqlssupsrglxmwn.supabase.co
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PULSE_SYNTH_MODEL: claude-sonnet-4-6
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}   # X/Twitter for Pulse (free syndication blocks CI IPs)
      # Rotating residential proxy for SOURCE fetches only (recovers datacenter-IP-blocked feeds:
      # AlphaSignal, Import AI, Reddit, X). Scoped via RADAR_PROXY so it never touches Supabase/Anthropic.
      RADAR_PROXY: http://${{ secrets.WEBSHARE_PROXY_USERNAME }}-rotate:${{ secrets.WEBSHARE_PROXY_PASSWORD }}@p.webshare.io:80
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Ingest sources -> pulse_items
        run: |
          MODE="${{ github.event.inputs.mode || 'schedule' }}"
          SCHED="${{ github.event.schedule }}"
          # Brief window = the dedicated 11/16/22 cron fired (delay-proof, unlike checking the wall clock).
          IS_BRIEF="no"; [ "$SCHED" = "0 11,16,22 * * *" ] && IS_BRIEF="yes"
          if [ "$MODE" = "synthesize" ]; then
            echo "mode=synthesize -> skipping ingest"
          else
            # X via Apify only in brief windows (or any manual run): keeps hourly ingest cheap.
            XFLAG=""
            if [ "$MODE" != "schedule" ] || [ "$IS_BRIEF" = "yes" ]; then XFLAG="--with-x"; fi
            python backend/pulse.py ingest $XFLAG
          fi
      - name: Synthesize brief (3x/day on schedule, or on demand)
        run: |
          MODE="${{ github.event.inputs.mode || 'schedule' }}"
          SCHED="${{ github.event.schedule }}"
          if [ "$MODE" = "synthesize" ] || [ "$MODE" = "both" ] || { [ "$MODE" = "schedule" ] && [ "$SCHED" = "0 11,16,22 * * *" ]; }; then
            python backend/pulse.py synthesize
          else
            echo "Skipping synthesis (mode=$MODE, schedule='$SCHED'; brief runs on the '0 11,16,22' cron = ~7am/12pm/6pm ET)."
          fi
